server:
  port: 8080

spring:
  application:
    name: library-admin-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
    default: local
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
  sql:
    init:
      mode: never

app:
  auth:
    token-header: X-Student-Token
    admin-token-header: X-Admin-Token
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,https://*.amplifyapp.com,https://ssejo.site,https://www.ssejo.site,http://13.209.33.104}
  datasource:
    enabled: false
  iot:
    enabled: false
    mqtt:
      enabled: false
      broker-url: ${MQTT_BROKER_URL:tcp://0.tcp.jp.ngrok.io:11606}
      client-id-prefix: ${MQTT_CLIENT_ID_PREFIX:library-admin-backend}
      username: ${MQTT_USERNAME:}
      password: ${MQTT_PASSWORD:}
      qos: ${MQTT_QOS:1}
  aws:
    enabled: false
