server:
  port: 8080

spring:
  application:
    name: library-admin-backend
  profiles:
    default: local

app:
  auth:
    token-header: X-Student-Token
    admin-token-header: X-Admin-Token
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:5174
      - http://10.0.2.2:8080
  datasource:
    enabled: false
  iot:
    enabled: false
  aws:
    enabled: false
